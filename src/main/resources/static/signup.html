<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - CloudCompare AI</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes unfold { from { opacity: 0; transform: perspective(1200px) rotateX(25deg) translateY(50px) scale(0.8); } to { opacity: 1; transform: perspective(1200px) rotateX(0) translateY(0) scale(1); } }
        @keyframes liquidBorder { 0%, 100% { border-color: rgba(0, 212, 170, 0.15); box-shadow: 0 0 20px rgba(0, 212, 170, 0.05); } 50% { border-color: rgba(0, 212, 170, 0.5); box-shadow: 0 0 40px rgba(124, 58, 237, 0.15); } }
        @keyframes slideIn { from { opacity: 0; transform: translateZ(30px) translateY(20px); } to { opacity: 1; transform: translateZ(30px) translateY(0); } }
        @keyframes pulseStrength { 0% { opacity: 0.6; transform: scale(0.98); } 50% { opacity: 1; transform: scale(1.02); } 100% { opacity: 0.6; transform: scale(0.98); } }

        /* body styles moved to style.css */

        /* Auth nav */
        .auth-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2.5rem;
            position: relative;
            z-index: 20;
        }
        .auth-nav-logo {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; font-size: 1.2rem; color: #fff;
            text-decoration: none; transition: color 0.3s;
        }
        .auth-nav-logo i {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #00d4aa, #7c3aed);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-nav-actions { display: flex; gap: 0.5rem; align-items: center; }
        .theme-toggle-auth {
            width: 38px; height: 38px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fbbf24; font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .theme-toggle-auth:hover { background: rgba(0,212,170,0.12); border-color: #00d4aa; transform: translateY(-2px) rotate(15deg); }
        .theme-toggle-auth:active i { transform: rotate(180deg); }
        .theme-toggle-auth i { transition: transform 0.4s ease; }

        .auth-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
            perspective: 1500px;
        }

        .auth-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 3rem 3.5rem;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(25px);
            animation: unfold 1.2s cubic-bezier(0.23, 1, 0.32, 1) both, liquidBorder 4s infinite alternate;
            position: relative;
            transform-style: preserve-3d;
            transition: background 0.5s, border-color 0.5s, box-shadow 0.5s;
        }

        .auth-header { text-align: center; margin-bottom: 2rem; transform: translateZ(50px); }
        .auth-header h2 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 0.5rem; transition: color 0.3s; }
        .auth-header p { color: #94a3b8; font-size: 1rem; transition: color 0.3s; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .form-group { margin-bottom: 1.2rem; transform: translateZ(30px); opacity: 0; animation: slideIn 0.8s forwards; }
        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }

        .form-group label { display: block; margin-bottom: 0.6rem; color: #94a3b8; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }
        .form-control {
            width: 100%;
            padding: 1.1rem 1.3rem;
            background: rgba(6, 11, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: white;
            font-family: inherit;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }
        .form-control:focus { outline: none; border-color: #00d4aa; background: rgba(6, 11, 30, 0.95); box-shadow: 0 0 25px rgba(0, 212, 170, 0.15); transform: scale(1.02); }

        .password-strength { margin-top: 0.8rem; font-size: 0.8rem; display: flex; align-items: center; gap: 10px; }
        .strength-bar { flex: 1; height: 6px; background: rgba(255, 255, 255, 0.1); border-radius: 10px; overflow: hidden; position: relative; }
        .strength-fill { height: 100%; width: 0; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 10px; }
        .strength-text { font-weight: 600; min-width: 45px; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }

        .btn-auth {
            width: 100%; padding: 1.2rem;
            background: linear-gradient(135deg, #00d4aa, #00b894); color: #060b1e;
            border: none; border-radius: 14px; font-weight: 900; font-size: 1.1rem;
            cursor: pointer; transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            margin-top: 1rem; position: relative; overflow: hidden; transform: translateZ(40px);
        }
        .btn-auth:hover { transform: translateZ(60px) translateY(-5px); box-shadow: 0 20px 40px rgba(0, 212, 170, 0.35); }
        
        .auth-footer { margin-top: 2rem; text-align: center; color: #64748b; transform: translateZ(20px); transition: color 0.3s; }
        .auth-footer a { color: #00d4aa; text-decoration: none; font-weight: 800; transition: 0.3s; }
        .auth-footer a:hover { color: white; text-shadow: 0 0 10px #00d4aa; }

        .alert { display: none; padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem; font-size: 0.95rem; animation: slideIn 0.4s ease-out; }
        .alert-error { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .alert-success { background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); color: #86efac; }
        
        .form-validation { font-size: 0.75rem; margin-top: 0.4rem; display: none; align-items: center; gap: 0.3rem; }
        .form-validation.error { color: #fca5a5; display: flex; }
        .form-validation.success { color: #86efac; display: flex; }

        /* removed light theme */
    </style>
</head>
<body>
    <div class="stars"></div>
    <nav class="auth-nav">
        <a href="index.html" class="auth-nav-logo">
            <i class="fas fa-cloud"></i> CloudCompare AI
        </a>
        <div class="auth-nav-actions">
            <!-- removed theme toggle -->
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h2>Create Account</h2>
                <p>Join CloudCompare AI today</p>
            </div>
            
            <div id="statusMsg" class="alert"></div>

            <form id="signupForm">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" class="form-control" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" class="form-control" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                    <div class="form-validation" id="emailValidation"></div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="Create a strong password" required>
                    <i class="fas fa-eye toggle-password" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:#94a3b8;"></i>
                    
                    <div class="password-strength">
                        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
                        <span class="strength-text" id="strengthText">Weak</span>
                    </div>
                    <div class="form-validation" id="passwordValidation"></div>
                </div>

                <button type="submit" class="btn-auth" id="signupBtn">
                    <i class="fas fa-user-plus"></i> Create Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>

    <script>
        // ═══ Theme Toggle Removed ═══

        // ═══ PASSWORD VISIBILITY TOGGLE ═══
        (function initPasswordToggle() {
            const toggleIcon = document.querySelector('.toggle-password');
            const passwordInput = document.getElementById('password');
            if (!toggleIcon || !passwordInput) return;

            toggleIcon.addEventListener('click', () => {
                const isHidden = passwordInput.type === 'password';
                passwordInput.type = isHidden ? 'text' : 'password';
                toggleIcon.classList.toggle('fa-eye', isHidden);
                toggleIcon.classList.toggle('fa-eye-slash', !isHidden);
                // keep focus for better UX
                passwordInput.focus();
            });


            // initialize icon state
            const isHiddenNow = passwordInput.type === 'password';
            toggleIcon.classList.toggle('fa-eye', isHiddenNow);
            toggleIcon.classList.toggle('fa-eye-slash', !isHiddenNow);
        })();

        // ═══ FORM VALIDATION ═══
        const emailRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;

        const passRegex = /^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$/;

        const pwInput = document.getElementById('password');
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        const pwValidation = document.getElementById('passwordValidation');

        pwInput.addEventListener('input', (e) => {
            const val = e.target.value;
            let strength = 0;
            if (val.length >= 8) strength += 25;
            if (val.match(/[A-Z]/)) strength += 25;
            if (val.match(/[0-9]/)) strength += 25;
            if (val.match(/[^A-Za-z0-9]/)) strength += 25;

            fill.style.width = strength + '%';
            if (strength <= 25) {
                fill.style.background = '#ef4444';
                fill.style.boxShadow = '0 0 10px #ef4444';
                text.textContent = 'Weak';
                text.style.color = '#ef4444';
            } else if (strength <= 50) {
                fill.style.background = '#f59e0b';
                fill.style.boxShadow = '0 0 10px #f59e0b';
                text.textContent = 'Fair';
                text.style.color = '#f59e0b';
            } else if (strength <= 75) {
                fill.style.background = '#3b82f6';
                fill.style.boxShadow = '0 0 10px #3b82f6';
                text.textContent = 'Good';
                text.style.color = '#3b82f6';
            } else {
                fill.style.background = '#10b981';
                fill.style.boxShadow = '0 0 15px #10b981';
                text.textContent = 'Strong';
                text.style.color = '#10b981';
                fill.style.animation = 'pulseStrength 2s infinite';
            }

            if (val.length > 0 && strength < 100) {
                pwValidation.innerHTML = '<i class="fas fa-info-circle"></i> Requires 8+ chars, uppercase, number, & special char.';
                pwValidation.classList.remove('success'); pwValidation.classList.add('error');
            } else if (strength === 100) {
                pwValidation.innerHTML = '<i class="fas fa-check-circle"></i> Password meets all requirements';
                pwValidation.classList.remove('error'); pwValidation.classList.add('success');
            } else {
                pwValidation.style.display = 'none';
            }
        });

        document.getElementById('email').addEventListener('blur', () => {
            const emailValidation = document.getElementById('emailValidation');
            const email = document.getElementById('email').value.trim();
            if (!email) { emailValidation.style.display = 'none'; return; }
            
            if (!emailRegex.test(email)) {
                emailValidation.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format';
                emailValidation.classList.remove('success'); emailValidation.classList.add('error');
            } else {
                emailValidation.innerHTML = '<i class="fas fa-check-circle"></i> Valid email';
                emailValidation.classList.remove('error'); emailValidation.classList.add('success');
            }
        });

        // ═══ SIGNUP SUBMISSION ═══
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!emailRegex.test(email) || !passRegex.test(password)) {
                triggerErrorShake();
                return;
            }

            const btn = document.getElementById('signupBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
            btn.disabled = true;
            statusMsg.style.display = 'none';
            statusMsg.className = 'alert';

            const payload = {
                name: (document.getElementById('firstName').value.trim() + ' ' + document.getElementById('lastName').value.trim()).trim(),
                email: email,
                password: password
            };

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const text = await response.text();
                let data;
                try { data = JSON.parse(text); } catch(e) { data = {}; }

                if (response.ok) {
                    statusMsg.textContent = 'Account created successfully! Redirecting to login...';
                    statusMsg.classList.add('alert-success');
                    statusMsg.style.display = 'block';
                    createSuccessBurst();
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    triggerErrorShake();
                    statusMsg.textContent = data.message || data.error || 'Registration failed. Email might already exist.';
                    statusMsg.classList.add('alert-error');
                    statusMsg.style.display = 'block';
                }
            } catch (err) {
                triggerErrorShake();
                statusMsg.textContent = 'Unable to connect to the server. Please ensure the backend is running.';
                statusMsg.classList.add('alert-error');
                statusMsg.style.display = 'block';
            } finally {
                btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                btn.disabled = false;
            }
        });

        const card = document.querySelector('.auth-card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 35;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 35;
            card.style.transform = `perspective(1200px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        function triggerErrorShake() {
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 500);
        }

        function createSuccessBurst() {
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.style.position = 'absolute';
                p.style.width = Math.random() * 8 + 4 + 'px';
                p.style.height = p.style.width;
                p.style.background = Math.random() > 0.5 ? '#00d4aa' : '#7c3aed';
                p.style.borderRadius = '50%';
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.zIndex = '100';
                p.style.pointerEvents = 'none';
                
                const tx = (Math.random() - 0.5) * 400;
                const ty = (Math.random() - 0.5) * 400;
                
                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) scale(0)`, opacity: 0 }
                ], {
                    duration: Math.random() * 1000 + 500,
                    easing: 'cubic-bezier(0.2, 0.8, 0.2, 1)',
                    fill: 'forwards'
                });
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 1500);
            }
        }
    </script>
</body>
</html>
