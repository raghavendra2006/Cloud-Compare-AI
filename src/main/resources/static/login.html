<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CloudCompare AI</title>
    <link rel="stylesheet" href="./style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @keyframes unfold { from { opacity: 0; transform: perspective(1200px) rotateX(-25deg) translateY(50px) scale(0.8); } to { opacity: 1; transform: perspective(1200px) rotateX(0) translateY(0) scale(1); } }
        @keyframes drift { from { transform: translateY(110vh) rotate(0deg); } to { transform: translateY(-110px) rotate(360deg); } }
        @keyframes liquidBorder { 0%, 100% { border-color: rgba(0, 212, 170, 0.15); box-shadow: 0 0 20px rgba(0, 212, 170, 0.05); } 50% { border-color: rgba(0, 212, 170, 0.5); box-shadow: 0 0 40px rgba(124, 58, 237, 0.15); } }
        @keyframes scanline { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes slideIn { from { opacity: 0; transform: translateZ(30px) translateY(20px); } to { opacity: 1; transform: translateZ(30px) translateY(0); } }

        /* body styles moved to style.css */

        /* Auth nav */
        .auth-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.25rem 2.5rem;
            position: relative;
            z-index: 20;
        }
        .auth-nav-logo {
            display: flex; align-items: center; gap: 10px;
            font-weight: 700; font-size: 1.2rem; color: #fff;
            text-decoration: none; transition: color 0.3s;
        }
        .auth-nav-logo i {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #00d4aa, #7c3aed);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .auth-nav-actions { display: flex; gap: 0.5rem; align-items: center; }
        .theme-toggle-auth {
            width: 38px; height: 38px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.05);
            color: #fbbf24; font-size: 1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
        }
        .theme-toggle-auth:hover { background: rgba(0,212,170,0.12); border-color: #00d4aa; transform: translateY(-2px) rotate(15deg); }
        .theme-toggle-auth:active i { transform: rotate(180deg); }
        .theme-toggle-auth i { transition: transform 0.4s ease; }
        
        .auth-container {
            min-height: calc(100vh - 70px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
            z-index: 10;
            perspective: 1500px;
        }

        .auth-card {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 3.5rem 3.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 50px 100px rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(25px);
            animation: unfold 1.2s cubic-bezier(0.23, 1, 0.32, 1) both, liquidBorder 4s infinite alternate;
            position: relative;
            overflow: hidden;
            transform-style: preserve-3d;
            transition: background 0.5s, border-color 0.5s, box-shadow 0.5s;
        }

        .auth-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0, 212, 170, 0.02), transparent);
            animation: scanline 3s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        .auth-header { text-align: center; margin-bottom: 2.5rem; transform: translateZ(50px); }
        .auth-header .logo-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: inline-block;
            background: linear-gradient(135deg, #00d4aa, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 212, 170, 0.4));
            animation: float 4s ease-in-out infinite;
        }
        .auth-header h2 { font-size: 2rem; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 0.5rem; transition: color 0.3s; }
        .auth-header p { color: #94a3b8; font-size: 1rem; transition: color 0.3s; }

        .form-group { margin-bottom: 1.5rem; transform: translateZ(30px); opacity: 0; animation: slideIn 0.8s forwards; }
        .form-group label { display: block; margin-bottom: 0.6rem; color: #94a3b8; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; transition: color 0.3s; }

        .form-control {
            width: 100%;
            padding: 1.1rem 1.3rem;
            background: rgba(6, 11, 30, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: white;
            font-family: inherit;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-sizing: border-box;
        }

        .form-control:focus {
            outline: none;
            border-color: #00d4aa;
            background: rgba(6, 11, 30, 0.95);
            box-shadow: 0 0 25px rgba(0, 212, 170, 0.15);
            transform: scale(1.02);
        }

        .btn-auth {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(135deg, #00d4aa, #00b894);
            color: #060b1e;
            border: none;
            border-radius: 14px;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            margin-top: 1rem;
            position: relative;
            overflow: hidden;
            transform: translateZ(40px);
        }

        .btn-auth:hover { transform: translateZ(60px) translateY(-5px); box-shadow: 0 20px 40px rgba(0, 212, 170, 0.35); }
        .btn-auth::after { content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent); transition: 0.6s; }
        .btn-auth:hover::after { left: 100%; }

        .auth-footer { margin-top: 2.5rem; text-align: center; color: #64748b; transform: translateZ(20px); transition: color 0.3s; }
        .auth-footer a { color: #00d4aa; text-decoration: none; font-weight: 800; transition: 0.3s; }
        .auth-footer a:hover { color: white; text-shadow: 0 0 10px #00d4aa; }

        .forgot-password-link { text-align: right; margin-top: -0.5rem; margin-bottom: 1.5rem; transform: translateZ(25px); }
        .forgot-password-link a { color: #475569; font-size: 0.85rem; cursor: pointer; transition: 0.3s; }
        .forgot-password-link a:hover { color: #00d4aa; }

        .alert { display: none; padding: 1rem; border-radius: 12px; margin-bottom: 2rem; font-size: 0.95rem; animation: slideIn 0.4s ease-out; }
        .alert-error { background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .alert-success { background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.3); color: #86efac; }

        .particle-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
        .particle { position: absolute; background: #7c3aed; border-radius: 50%; opacity: 0.4; animation: drift linear infinite; }
        
        .light-follow {
            position: fixed; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(0, 212, 170, 0.06), transparent 70%);
            border-radius: 50%; pointer-events: none; z-index: 1;
            transform: translate(-50%, -50%);
            transition: left 0.15s ease-out, top 0.15s ease-out, opacity 0.5s;
        }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s; }
        .modal.active { opacity: 1; visibility: visible; }
        .modal .modal-content { background: rgba(15,23,42,0.95); border: 1px solid rgba(0,212,170,0.15); border-radius: 20px; padding: 2rem; width: 90%; max-width: 420px; backdrop-filter: blur(20px); transition: background 0.5s, border-color 0.5s; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .modal-header h3 { font-size: 1.3rem; }
        .modal-close { background: none; border: none; color: #94a3b8; font-size: 1.2rem; cursor: pointer; }
        .modal-description { color: #94a3b8; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .form-validation { font-size: 0.75rem; margin-top: 0.4rem; display: none; align-items: center; gap: 0.3rem; }
        .form-validation.error { color: #fca5a5; display: flex; }
        .form-validation.success { color: #86efac; display: flex; }

        /* removed light theme */
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="light-follow" id="lightFollow"></div>

    <nav class="auth-nav">
        <a href="index.html" class="auth-nav-logo">
            <i class="fas fa-cloud"></i> CloudCompare AI
        </a>
        <div class="auth-nav-actions">
            <!-- removed theme toggle -->
        </div>
    </nav>

    <div class="app-container">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="logo-icon"><i class="fas fa-cloud"></i></div>
                    <h2>Welcome Back</h2>
                    <p>Log in to access your dashboard</p>
                </div>
                
                <div id="errorMsg" class="alert alert-error">Invalid credentials</div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                        <div class="form-validation" id="emailValidation"></div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <i class="fas fa-eye toggle-password" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;color:#94a3b8;"></i>
                    </div>
                    <div class="forgot-password-link">
                        <a onclick="openForgotPasswordModal()">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn-auth" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Sign In
                    </button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign up</a>
                </div>
            </div>
        </div>

        <!-- Forgot Password Modal -->
        <div id="forgotPasswordModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Reset Password</h3>
                    <button class="modal-close" onclick="closeForgotPasswordModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <p class="modal-description">Enter your email address and we'll send you a link to reset your password.</p>
                
                <div id="resetStatusMsg" class="alert"></div>
                
                <form id="forgotPasswordForm">
                    <div class="form-group">
                        <label for="resetEmail">Email Address</label>
                        <input type="email" id="resetEmail" class="form-control" placeholder="you@example.com" required>
                        <div class="form-validation" id="resetEmailValidation"></div>
                    </div>
                    <button type="submit" class="btn-auth" id="resetBtn">
                        <i class="fas fa-paper-plane"></i> Send Reset Link
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // ═══ Theme Toggle Removed ═══

        // ═══ PASSWORD VISIBILITY TOGGLE ═══
        (function initPasswordToggle() {
            const toggleIcon = document.querySelector('.toggle-password');
            const passwordInput = document.getElementById('password');
            if (!toggleIcon || !passwordInput) return;

            toggleIcon.addEventListener('click', () => {
                const isHidden = passwordInput.type === 'password';
                passwordInput.type = isHidden ? 'text' : 'password';
                toggleIcon.classList.toggle('fa-eye', isHidden);
                toggleIcon.classList.toggle('fa-eye-slash', !isHidden);
                // keep focus for better UX
                passwordInput.focus();
            });

            // initialize icon state
            const isHiddenNow = passwordInput.type === 'password';
            toggleIcon.classList.toggle('fa-eye', isHiddenNow);
            toggleIcon.classList.toggle('fa-eye-slash', !isHiddenNow);
        })();

        // ═══ EMAIL VALIDATION ═══
        const emailRegex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;


        document.getElementById('email').addEventListener('blur', () => { validateLoginEmail(); });

        function validateLoginEmail() {
            const emailInput = document.getElementById('email');
            const emailValidation = document.getElementById('emailValidation');
            const email = emailInput.value.trim();
            if (!email) { emailValidation.style.display = 'none'; return true; }
            if (!emailRegex.test(email)) {
                emailValidation.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format';
                emailValidation.classList.remove('success'); emailValidation.classList.add('error'); return false;
            } else {
                emailValidation.innerHTML = '<i class="fas fa-check-circle"></i> Valid email';
                emailValidation.classList.remove('error'); emailValidation.classList.add('success'); return true;
            }
        }

        // ═══ FORGOT PASSWORD MODAL ═══
        function openForgotPasswordModal() {
            document.getElementById('forgotPasswordModal').classList.add('active');
            document.getElementById('resetStatusMsg').style.display = 'none';
            document.getElementById('resetStatusMsg').className = 'alert';
            document.getElementById('resetEmail').value = '';
            document.getElementById('resetEmailValidation').style.display = 'none';
        }
        function closeForgotPasswordModal() { document.getElementById('forgotPasswordModal').classList.remove('active'); }

        document.getElementById('resetEmail').addEventListener('blur', () => { validateResetEmail(); });
        function validateResetEmail() {
            const emailInput = document.getElementById('resetEmail');
            const emailValidation = document.getElementById('resetEmailValidation');
            const email = emailInput.value.trim();
            if (!email) { emailValidation.style.display = 'none'; return true; }
            if (!emailRegex.test(email)) {
                emailValidation.innerHTML = '<i class="fas fa-exclamation-circle"></i> Invalid email format';
                emailValidation.classList.remove('success'); emailValidation.classList.add('error'); return false;
            } else {
                emailValidation.innerHTML = '<i class="fas fa-check-circle"></i> Valid email';
                emailValidation.classList.remove('error'); emailValidation.classList.add('success'); return true;
            }
        }

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!validateResetEmail()) return;
            const btn = document.getElementById('resetBtn');
            const statusMsg = document.getElementById('resetStatusMsg');
            const email = document.getElementById('resetEmail').value.trim();
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending...'; btn.disabled = true; statusMsg.style.display = 'none';
            try {
                const response = await fetch('/api/auth/forgot-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }) });
                if (response.status === 404 || response.ok) {
                    statusMsg.textContent = 'If an account exists with this email, you will receive a password reset link.';
                    statusMsg.classList.add('alert-success'); statusMsg.style.display = 'block';
                    setTimeout(() => closeForgotPasswordModal(), 3000);
                } else {
                    statusMsg.textContent = 'Failed to process request. Please try again.';
                    statusMsg.classList.add('alert-error'); statusMsg.style.display = 'block';
                }
            } catch (err) {
                statusMsg.textContent = 'Network error. Please try again later.';
                statusMsg.classList.add('alert-error'); statusMsg.style.display = 'block';
            } finally { btn.innerHTML = '<i class="fas fa-paper-plane"></i> Send Reset Link'; btn.disabled = false; }
        });

        // ═══ LOGIN FORM ═══
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!validateLoginEmail()) return;
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...'; btn.disabled = true; errorMsg.style.display = 'none';
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
                const text = await response.text();
                let data; try { data = JSON.parse(text); } catch(e) { data = {}; }
                if (response.ok) {
                    createSuccessBurst(); localStorage.setItem('token', data.token); localStorage.setItem('userName', data.name);
                    setTimeout(() => { window.location.href = 'dashboard.html?login=success'; }, 1200);
                } else {
                    triggerErrorShake();
                    errorMsg.textContent = data.error || data.message || 'Invalid email or password'; errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.textContent = 'Unable to connect to the server. Please make sure the backend is running.'; errorMsg.style.display = 'block';
            } finally { btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In'; btn.disabled = false; }
        });

        document.getElementById('forgotPasswordModal').addEventListener('click', function(event) { if (event.target === this) closeForgotPasswordModal(); });

        // ═══ PARTICLES ═══
        function initParticleSystem() {
            const bg = document.createElement('div'); bg.className = 'particle-bg'; document.body.appendChild(bg);
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div'); p.className = 'particle';
                const size = Math.random() * 4 + 2;
                p.style.width = `${size}px`; p.style.height = `${size}px`; p.style.left = `${Math.random() * 100}%`;
                p.style.animationDuration = `${Math.random() * 10 + 10}s`; p.style.animationDelay = `${Math.random() * 10}s`;
                p.style.opacity = Math.random() * 0.5; bg.appendChild(p);
            }
        }
        initParticleSystem();

        // ═══ LIGHT FOLLOW + TILT ═══
        const light = document.getElementById('lightFollow');
        const card = document.querySelector('.auth-card');
        document.addEventListener('mousemove', (e) => {
            light.style.left = `${e.clientX}px`; light.style.top = `${e.clientY}px`;
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `perspective(1200px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        function createSuccessBurst() {
            for (let i = 0; i < 80; i++) {
                const p = document.createElement('div'); p.className = 'success-particle';
                p.style.setProperty('--tx', `${(Math.random() - 0.5) * 600}px`);
                p.style.setProperty('--ty', `${(Math.random() - 0.5) * 600}px`);
                p.style.left = '50%'; p.style.top = '50%';
                p.style.background = Math.random() > 0.5 ? '#00d4aa' : '#7c3aed';
                document.body.appendChild(p); setTimeout(() => p.remove(), 1000);
            }
        }
        function triggerErrorShake() { card.classList.add('shake'); setTimeout(() => card.classList.remove('shake'), 500); }
    </script>
</body>
</html>
