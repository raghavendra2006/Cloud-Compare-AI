# Server Configuration
server.port=5000

# Groq API Configuration
grok.api.key=YOUR_GROQ_API_KEY_HERE
grok.endpoint=https://api.groq.com/openai/v1/chat/completions
grok.model=llama-3.1-8b-instant

# Request timeout (ms)
grok.timeout=6000

# Max retries — 1 retry is enough for speed
grok.max-retries=1

# Static resources
spring.web.resources.static-locations=classpath:/static/

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:cloudcompare
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.hibernate.ddl-auto=update

